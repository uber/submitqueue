name: Run Bazel Test
description: Run a Bazel test target

inputs:
  target:
    description: Bazel test target pattern
    required: true

runs:
  using: composite
  steps:
    - name: Run Bazel test
      shell: bash
      # Pass the target through env rather than interpolating ${{ inputs.target }}
      # directly into the script, so a composite-action input can never inject
      # shell commands.
      env:
        TARGET: ${{ inputs.target }}
      run: ./tool/bazel test "$TARGET" --test_output=streamed
