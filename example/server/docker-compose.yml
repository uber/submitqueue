# Docker Compose for Full Stack (Gateway + Orchestrator + MySQL)
#
# IMPORTANT: Before running docker-compose, build the Linux binaries:
#   make build-gateway-linux build-orchestrator-linux
#   OR
#   bazel build --platforms=@rules_go//go/toolchain:linux_amd64 //example/server/gateway //example/server/orchestrator
#
# Quick start:
#   make e2e-test

services:
  # Application Database - Stores business data (requests, counters, etc.)
  mysql-app:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: submitqueue
    ports:
      - "3306"  # Random ephemeral port to avoid conflicts
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Queue Database - Messaging infrastructure (messages, offsets, partition leases)
  # Separate from app DB to demonstrate queue is pluggable infrastructure
  mysql-queue:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: submitqueue
    ports:
      - "3306"  # Random ephemeral port to avoid conflicts
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway-service:
    build:
      context: ${REPO_ROOT}
      dockerfile: example/server/gateway/Dockerfile
    ports:
      - "8080"  # Random ephemeral port to avoid conflicts
    environment:
      - PORT=:8080
      # Application database connection
      - MYSQL_DSN=root:root@tcp(mysql-app:3306)/submitqueue?parseTime=true
      # Queue infrastructure connection (separate database)
      - QUEUE_MYSQL_DSN=root:root@tcp(mysql-queue:3306)/submitqueue?parseTime=true
    depends_on:
      mysql-app:
        condition: service_healthy
      mysql-queue:
        condition: service_healthy

  orchestrator-service:
    build:
      context: ${REPO_ROOT}
      dockerfile: example/server/orchestrator/Dockerfile
    ports:
      - "8080"  # Random ephemeral port to avoid conflicts
    environment:
      - PORT=:8080
      # Application database connection (for request state, batches, etc.)
      - MYSQL_DSN=root:root@tcp(mysql-app:3306)/submitqueue?parseTime=true
      # Queue infrastructure connection (separate database)
      - QUEUE_MYSQL_DSN=root:root@tcp(mysql-queue:3306)/submitqueue?parseTime=true
      - HOSTNAME=orchestrator-dev
    depends_on:
      mysql-app:
        condition: service_healthy
      mysql-queue:
        condition: service_healthy
