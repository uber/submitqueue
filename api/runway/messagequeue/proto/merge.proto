syntax = "proto3";

package uber.runway.messagequeue;

import "api/base/change/proto/change.proto";
import "api/base/mergestrategy/proto/mergestrategy.proto";
import "api/base/messagequeue/proto/messagequeue.proto";

option go_package = "github.com/uber/submitqueue/api/runway/messagequeue/protopb";
option java_multiple_files = true;
option java_outer_classname = "MergeProto";
option java_package = "com.uber.submitqueue.runway.messagequeue";

// MergeStep is one step of an ordered merge: a single set of change(s) applied
// with a strategy. Runway applies the steps of a request in order on top of the
// merge target; the ordering encodes the base-layering (earlier steps are the
// in-flight base, the last step is the candidate).
message MergeStep {
    // step_id is an opaque, caller-assigned identifier for this step. Runway
    // treats it as an attribution token only -- it echoes it back per-step in
    // StepResult so a multi-step result is attributable -- and never interprets
    // its contents.
    string step_id = 1;
    // changes are the code change(s) to apply for this step.
    repeated uber.base.change.Change changes = 2;
    // strategy is how this step's changes are integrated into the merge target.
    uber.base.mergestrategy.Strategy strategy = 3;
}

// MergeRequest is the payload a client publishes to one of Runway's merge
// queues: the merge-conflict-check topic for a dry-run check, the merge topic
// for a committing merge. The id is owned by the client so it can record the
// in-flight work before publishing and correlate the asynchronous result;
// Runway echoes it back unchanged.
message MergeRequest {
    option (uber.base.messagequeue.topic_keys) = "merge-conflict-check";
    option (uber.base.messagequeue.topic_keys) = "runway-merge";

    // id is the client-owned correlation id for this request (one per request).
    // Runway echoes it back on the result unchanged.
    string id = 1;
    // queue_name is the caller-provided queue name the request belongs to.
    // Runway resolves the merge target and provider config per-queue from this
    // name; no target ref is passed.
    string queue_name = 2;
    // steps is the ordered application sequence: in-flight steps first, the
    // candidate last. A single-element list expresses "candidate vs merge
    // target".
    repeated MergeStep steps = 3;
}

// StepOutput is a single output a merge step produced on the merge target.
message StepOutput {
    // id is the VCS-neutral revision identifier -- a git commit SHA, a Mercurial
    // changeset hash, a Subversion revision number, a Perforce changelist, and so
    // on.
    string id = 1;
    // (room to grow: author, committed_at, parent, ...)
}

// StepResult reports what happened to a single MergeStep, so a multi-step result
// is attributable to the step that produced (or failed to produce) it.
message StepResult {
    // step_id echoes the step_id of the step this result is for.
    string step_id = 1;
    // outputs are the revisions this step produced on the merge target, in
    // application order (the order the step created them on the target). Empty
    // for a dry-run check, for a change already present on the target, or for a
    // step that failed to apply.
    repeated StepOutput outputs = 2;
    // reason is a human-readable explanation when the step failed to apply.
    // Empty on success.
    string reason = 3;
}

// Outcome is the overall result of applying a MergeRequest's ordered step
// sequence.
enum Outcome {
    // OUTCOME_UNSPECIFIED is the zero value; a well-formed result never uses it.
    OUTCOME_UNSPECIFIED = 0;
    // SUCCEEDED means the whole sequence applied cleanly: mergeable for a
    // dry-run check, merged for a committing merge.
    SUCCEEDED = 1;
    // FAILED means the sequence could not be applied: a conflict for a dry-run
    // check, a failed apply for a committing merge.
    FAILED = 2;
}

// MergeResult is the payload Runway publishes to the corresponding signal queue
// (merge-conflict-check-signal for a check, merge-signal for a merge) once a
// request completes.
message MergeResult {
    option (uber.base.messagequeue.topic_keys) = "merge-conflict-check-signal";
    option (uber.base.messagequeue.topic_keys) = "merge-signal";

    // id echoes the client-owned correlation id from the request.
    string id = 1;
    // outcome is SUCCEEDED if the whole ordered step sequence applied cleanly
    // (mergeable for a dry-run check, merged for a committing merge), FAILED
    // otherwise.
    Outcome outcome = 2;
    // reason is a human-readable explanation when outcome is FAILED. Empty on
    // success.
    string reason = 3;
    // steps optionally reports per-step outcomes, in request order. A committing
    // merge populates each step's outputs with the revisions it produced; a
    // dry-run check leaves them empty.
    repeated StepResult steps = 4;
}
