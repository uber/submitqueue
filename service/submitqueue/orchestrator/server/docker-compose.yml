# Docker Compose for Orchestrator Manual Testing
#
# IMPORTANT: Before running docker-compose, build the Linux binary:
#   make build-orchestrator-linux
#   OR
#   bazel build --platforms=@rules_go//go/toolchain:linux_amd64 //service/submitqueue/orchestrator/server
#
# Quick start:
#   make docker-orchestrator  (builds binary + starts compose)

services:
  # Application Database - Stores business data (requests, batches, etc.)
  mysql-app:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: submitqueue
      MYSQL_INITDB_SKIP_TZINFO: ${SQ_MYSQL_INITDB_SKIP_TZINFO:-}
    ports:
      - "3306" # Random ephemeral port to avoid conflicts
    volumes:
      - type: ${SQ_MYSQL_DATA_MOUNT_TYPE:-volume}
        target: /var/lib/mysql
    healthcheck:
      # Use 127.0.0.1 (TCP) instead of localhost (Unix socket). MySQL treats
      # "localhost" as a socket connection, which can be ready before the TCP
      # listener — causing dependent services that connect over TCP to fail.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 1s
      timeout: 2s
      retries: 60

  # Queue Database - Messaging infrastructure (messages, offsets, partition leases)
  # Separate from app DB to demonstrate queue is pluggable infrastructure
  mysql-queue:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: submitqueue
      MYSQL_INITDB_SKIP_TZINFO: ${SQ_MYSQL_INITDB_SKIP_TZINFO:-}
    ports:
      - "3306" # Random ephemeral port to avoid conflicts
    volumes:
      - type: ${SQ_MYSQL_DATA_MOUNT_TYPE:-volume}
        target: /var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 1s
      timeout: 2s
      retries: 60

  orchestrator-service:
    image: ${SQ_DOCKER_IMAGE_PREFIX:-submitqueue}-orchestrator-service:latest
    build:
      context: ${REPO_ROOT}
      dockerfile: service/submitqueue/orchestrator/server/Dockerfile
    ports:
      - "8080" # Random ephemeral port to avoid conflicts
    environment:
      - PORT=:8080
      # Application database connection (for request state, batches, etc.)
      - MYSQL_DSN=root:root@tcp(mysql-app:3306)/submitqueue?parseTime=true
      # Queue infrastructure connection (separate database)
      - QUEUE_MYSQL_DSN=root:root@tcp(mysql-queue:3306)/submitqueue?parseTime=true
      - HOSTNAME=orchestrator-dev
    depends_on:
      mysql-app:
        condition: service_healthy
      mysql-queue:
        condition: service_healthy
